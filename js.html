<script>
/* FUNGSI BUKA/TUTUP MENU HP (DENGAN OVERLAY 2/3) */
function toggleMobileMenu() {
    const nav = document.getElementById("nav-links");
    const overlay = document.getElementById("menu-overlay");
    
    nav.classList.toggle("active");
    
    if (nav.classList.contains("active")) {
        overlay.style.display = "block";
    } else {
        overlay.style.display = "none";
    }
}

/* MODIFIKASI FUNGSI SHOWPAGE (TUTUP MENU + OVERLAY SETELAH KLIK) */
function showPage(pageName) {
    // 1. Logika ganti konten
    const titleMap = {
        'struktur': '📂 Struktur Kurikulum',
        'agenda': '📅 Agenda Sekolah',
        'kalender': '🗓️ Kalender Pendidikan',
        'staff': '👥 Daftar Staff & Guru'
    };
    
    if(titleMap[pageName]) {
        document.querySelector(".card h2").innerText = titleMap[pageName];
    }

    // 2. TUTUP MENU & OVERLAY (Khusus Mobile)
    const nav = document.getElementById("nav-links");
    const overlay = document.getElementById("menu-overlay");
    
    if (nav.classList.contains("active")) {
        nav.classList.remove("active");
        overlay.style.display = "none"; // Pastikan overlay juga hilang
    }
}

let userRole = ""; 

// --- FUNGSI YANG HILANG TADI ---
function showLogin(){
  document.getElementById("loginModal").style.display = "flex";
}
// ------------------------------
function login() {
  // 1. Ambil semua nilai input
  let role = document.getElementById("role").value;
  let nama = document.getElementById("loginName").value; // Input Nama
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;
  let msg = document.getElementById("loginMsg");

  // 2. VALIDASI NAMA
  if (!nama || nama.length < 3) {
    msg.innerText = "❌ Silakan pilih Nama Anda dari saran yang muncul!";
    msg.style.color = "red";
    document.getElementById("loginName").style.borderColor = "red";
    return; 
  }

  document.getElementById("loginName").style.borderColor = "#b3e5fc";

  // 3. Verifikasi server
  msg.innerText = "⌛ Memverifikasi...";

  google.script.run.withSuccessHandler(function(response) {
    if (response.success) {
      // ISI TULISAN LOGIN DI FOOTER
      const footerInfo = document.getElementById("footerLoginInfo");
      if (footerInfo) {
        footerInfo.innerHTML = "👤 <span style='color: #000;'>Anda login sebagai: </span><strong>" + nama + "</strong>";
      }
      
      userRole = response.role;
      masukDashboard(response.role);
    } else {
      msg.innerText = "❌ ID atau Password salah!";
      msg.style.color = "red";
    }
  }).checkLoginServer(user, pass, role);
} 

function masukDashboard(tipe){
  document.getElementById("loginModal").style.display = "none";
  document.querySelector(".hero").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("sub-menu-login").style.display = "flex";
  
  // SIMPAN TIPE LOGIN KE VARIABEL GLOBAL
  userRole = tipe; 
  
  let menu = document.getElementById("menu");
  
  if(tipe === "guru"){
    document.querySelector(".card h2").innerText = "📂 Arsip Kurikulum (Guru)";
  } else {
    document.querySelector(".card h2").innerText = "📂 Layanan Siswa";
    
    // Hapus menu yang tidak boleh dilihat siswa (SKBM & SK LAIN tetap dihapus untuk siswa)
    for (let i = menu.options.length - 1; i >= 0; i--) {
      if (menu.options[i].value === "skbm" || menu.options[i].value === "sklain") {
        menu.remove(i);
      }
    }
  }
  
  loadNames();
}
    
/* ================= FUNGSI LOGOUT (DIPERBAIKI) ================= */
function logout(){
  try {
    // 1. Sembunyikan Dashboard, tampilkan Hero
    document.getElementById("dashboard").style.display = "none";
    document.querySelector(".hero").style.display = "block";
    document.getElementById("sub-menu-login").style.display = "none";

    // 2. Kosongkan input login agar tidak nyangkut saat refresh
    if(document.getElementById("user")) document.getElementById("user").value = "";
    if(document.getElementById("pass")) document.getElementById("pass").value = "";
    
    // 3. REFRESH HALAMAN (Ini intinya)
    // Gunakan window.location.reload(true) untuk memastikan refresh total
    window.location.reload(); 
    
  } catch(e) {
    // Jika ada error di kode atas, tetap paksa refresh
    window.location.reload();
  }
}

/* SEARCH */
let allNames=[];
let currentDownloadUrl="";

function loadNames() {
  if (allNames.length > 0) return; 

  google.script.run.withSuccessHandler(res => {
    allNames = res;
    console.log("Data berhasil dimuat");

    // CEK: Jika user sedang mengetik di login, langsung update saran namanya
    let loginInput = document.getElementById("loginName");
    if (loginInput && loginInput.value.length >= 3) {
      searchLoginName(); // Panggil ulang pencarian setelah data siap
    }
  }).getNames();
}

function searchName(){
  let input = document.getElementById("search").value.toLowerCase();
  let box = document.getElementById("suggestions");
  let menu = document.getElementById("menu");
  let sub = document.getElementById("subMenu");
  let btn = document.getElementById("downloadBtn");

  box.innerHTML = "";
  
  // Jika user menghapus/mengubah ketikan, tutup lagi menunya
  menu.style.display = "none";
  sub.innerHTML = "";
  btn.style.display = "none";

  if(input.length < 3) return;

  let filtered = allNames.filter(n => n.toLowerCase().includes(input));

  filtered.slice(0, 8).forEach(name => {
    let div = document.createElement("div");
    div.className = "suggest-item";
    div.innerText = name;

    // KETIKA NAMA DIKLIK
    div.onclick = function(){
      document.getElementById("search").value = name;
      box.innerHTML = "";
      
      // Reset dan munculkan menu
      menu.selectedIndex = 0; // Kembalikan ke "Pilih Jenis Arsip"
      menu.style.display = "block"; 
      sub.innerHTML = ""; // Bersihkan branch lama jika ada
      btn.style.display = "none";
    };

    box.appendChild(div);
  });
}

/* MENU */
function changeMenu(){
  let nama = document.getElementById("search").value;
  let menu = document.getElementById("menu").value;
  let sub = document.getElementById("subMenu");
  let btn = document.getElementById("downloadBtn");

  // Bersihkan subMenu dan sembunyikan tombol setiap kali ganti kategori
  sub.innerHTML = "";
  btn.style.display = "none";

  console.log("Kategori dipilih:", menu); // Untuk cek di Inspect Element

  // --- FITUR TRANSKRIP ---
  if (menu === "transkrip") {
    sub.innerHTML = `
      <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
        <button id="btnInputTranskrip" onclick="bukaTranskripExcel()" class="premium-input" style="background:#27ae60; color:white; font-weight:bold; cursor:pointer; margin-top:0; display:none;">
          📝 Input Nilai Transkrip
        </button>
        <button onclick="loadDownloadTranskrip()" class="premium-input" style="background:#0288d1; color:white; font-weight:bold; cursor:pointer; margin-top:0;">
          ⬇️ Download Transkrip
        </button>
      </div>`;

    // Tombol Input hanya muncul jika userRole adalah guru
    if(userRole === "guru") {
      document.getElementById("btnInputTranskrip").style.display = "block";
    }
  } 
  
  // --- FITUR LAMA (TETAP DIJAGA) ---
  if (menu === "skbm") {
    sub.innerHTML = `
      <select id="tahun" class="premium-input" onchange="loadDownload()">
        <option value="" disabled selected>-- Pilih Tahun Ajaran --</option>
        <option value="2026-Genap">2026 Genap</option>
        <option value="2026-Ganjil">2026 Ganjil</option>
        <option value="2025-Genap">2025 Genap</option>
        <option value="2025-Ganjil">2025 Ganjil</option>
        <option value="2024-Genap">2024 Genap</option>
        <option value="2024-Ganjil">2024 Ganjil</option>
      </select>`;
  } 
  else if (menu === "sertifikat") {
    sub.innerHTML = `
      <select id="jenis" class="premium-input" onchange="loadDownload()">
        <option value="" disabled selected>-- Pilih Jenis Sertifikat --</option>
        <option value="-IHT">Sertifikat IHT</option>
        <option value="-WORKSHOP">Sertifikat Workshop</option>
        <option value="-LAIN">Lainnya</option>
      </select>`;
  } 
  else if (menu === "sklain") {
    sub.innerHTML = `
      <select id="jenis" class="premium-input" onchange="loadDownload()">
        <option value="" disabled selected>-- Pilih Jenis SK --</option>
        <option value="SK-PEMBINA">SK Pembina</option>
        <option value="SK-PANITIA">SK Panitia</option>
      </select>`;
  }
}

/* FUNGSI UNTUK MENAMPILKAN HALAMAN PILIHAN TRANSKRIP */
function bukaTranskripExcel() {
  const subMenu = document.getElementById("subMenu");
  const areaPilih = document.getElementById("halamanPilihTranskrip");
  const container = document.getElementById("listFileTranskrip");
  const loading = document.getElementById("loadingTranskrip");

  subMenu.style.display = "none";
  areaPilih.style.display = "block";
  container.innerHTML = "";
  loading.style.display = "block";

  // MASUKKAN URL WEB APP (EXEC) KAMU DI SINI:
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyA1HLWewHAmRODVtY5geEtAeuNNi1och8ybcMihy_pRhBhz8TmvF2WXh_ltVs7UEXz0Q/exec"; 

  // Memanggil API yang sudah kita buat di doGet tadi
  fetch(GAS_URL + "?action=getTranskripFiles")
    .then(response => response.json())
    .then(files => {
      loading.style.display = "none";
      if (files && files.length > 0) {
        files.forEach(f => {
          let btn = document.createElement("button");
          btn.className = "premium-input";
          btn.style.cssText = "background:white; color:#333; text-align:left; cursor:pointer; border:1px solid #b3e5fc; margin-bottom:8px; display:block; width:100%; padding:12px; font-weight:500;";
          btn.innerHTML = "📄 " + f.name;
          
          btn.onclick = function() {
            // Memasuki Sheet 2 (Input Nilai) secara otomatis
            window.open(f.url + "#gid=1510340338", "_blank");
          };
          container.appendChild(btn);
        });
      } else {
        container.innerHTML = "<p style='font-size:12px; color:red; text-align:center;'>❌ File tidak ditemukan di Drive.</p>";
      }
    })
    .catch(err => {
      loading.innerText = "❌ Koneksi Gagal: " + err.message;
    });
}

/* ENTER KEY LOGIN */
function checkEnter(e){

}

/* DOWNLOAD */
function loadDownload(){
  let nama = document.getElementById("search").value;
  let menu = document.getElementById("menu").value;
  let tahun = document.getElementById("tahun")?.value || "";
  let jenis = document.getElementById("jenis")?.value || "";

  if(!nama || !menu) return;

  let btn = document.getElementById("downloadBtn");
  btn.innerHTML = '<span class="spinner-icon"></span> Sedang mencari file...';
  btn.classList.add("disabled");
  btn.style.display = "block";

  let searchString = "";
  
  if(menu === "skbm") {
    // LOGIKA: Guru sudah pilih nama di awal, tapi kita HANYA cari 
    // file yang judulnya mengandung "SKBM", "Tahun", dan "Semester"
    let tahunBersih = tahun.replace("-", " "); // "2026-Genap" jadi "2026 Genap"
    searchString = "SKBM " + tahunBersih; 
  } 
  else if(menu === "sertifikat") {
    // Untuk sertifikat, nama guru WAJIB ada di judul file
    searchString = nama + " " + (jenis ? jenis.replace("-", "") : "IHT"); 
  } 
  else {
    searchString = nama;
  }

  // Panggil server dengan parameter string pencarian dan kategorinya
  google.script.run.withSuccessHandler(function(url){
    if(url){
      currentDownloadUrl = url;
      // Kembalikan tombol ke kondisi normal
      btn.innerHTML = '⬇ Download File'; 
      btn.classList.remove("disabled");
      btn.style.opacity = "1";
    } else {
      showFileNotFound();
    }
}).getDownloadLink(searchString, menu);
}

/* ===== TAMPILKAN FILE TIDAK DITEMUKAN ===== */

function showFileNotFound(){

let btn=document.getElementById("downloadBtn");

currentDownloadUrl="";
btn.style.display="block";
btn.classList.add("disabled");
btn.innerText="❌ File tidak ditemukan";

}

function openDownload(){
if(currentDownloadUrl){
window.open(currentDownloadUrl,"_blank");
}
}

// Fungsi saat tombol Guru/Siswa diklik
function selectRole(role) {
  // 1. PANGGIL DATA DARI GOOGLE SHEET (Sangat Penting!)
  // Kita panggil di sini agar saat user mulai mengetik nama, data sudah siap.
  loadNames(); 

  document.getElementById("role").value = role;
  document.getElementById("roleSelection").style.display = "none";
  document.getElementById("loginFields").style.display = "block";
  
  let teks = (role === 'guru') ? "Login sebagai Guru" : "Login sebagai Siswa";
  document.getElementById("selectedRoleText").innerText = teks;
}

// Fungsi untuk kembali pilih role
/* FUNGSI RESET & BERSIHKAN FORM LOGIN */
function resetRole() {
  // 1. Kembalikan tampilan ke pilihan Role (Guru/Siswa)
  document.getElementById("roleSelection").style.display = "flex";
  document.getElementById("loginFields").style.display = "none";
  
  // 2. Bersihkan pesan error (merah)
  document.getElementById("loginMsg").innerText = "";
  
  // 3. Kosongkan semua kotak input agar tidak ada sisa ketikan
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  
  // 4. Reset nilai role yang tersimpan di hidden input
  document.getElementById("role").value = "";
  document.getElementById("loginSuggestions").innerHTML = "";
  document.getElementById("loginName").value = ""; // Bersihkan nama
}

/* FUNGSI TUTUP MODAL LOGIN (X ATAU ESC) */
/* ================= FUNGSI RESET & BERSIHKAN FORM LOGIN ================= */
function resetRole() {
  // 1. Munculkan kembali tombol pilihan Role (Guru/Siswa)
  document.getElementById("roleSelection").style.display = "flex";
  
  // 2. Sembunyikan kotak input User & Password
  document.getElementById("loginFields").style.display = "none";
  
  // 3. Bersihkan pesan error merah (jika tadi sempat salah login)
  document.getElementById("loginMsg").innerText = "";
  
  // 4. KOSONGKAN isi kotak ID User dan Password agar tidak ada sisa ketikan
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  
  // 5. Reset nilai role yang tersimpan di hidden input
  document.getElementById("role").value = "";
}

/* ================= FUNGSI TUTUP MODAL LOGIN (TOMBOL X / ESC) ================= */
function closeLogin() {
  // Sembunyikan modal login dari layar
  document.getElementById("loginModal").style.display = "none";
  
  // Panggil fungsi reset agar saat modal dibuka lagi, form sudah kosong & bersih
  resetRole(); 
}

/* FUNGSI CARI NAMA DI MODAL LOGIN */
function searchLoginName() {
  let inputVal = document.getElementById("loginName").value;
  let input = inputVal.toLowerCase();
  let box = document.getElementById("loginSuggestions");
  
  box.innerHTML = ""; 

  if (input.length < 3) return;

  if (!allNames || allNames.length === 0) {
    box.innerHTML = "<div class='suggest-item'>⌛ Memuat data nama...</div>";
    box.style.display = "block";
    loadNames(); 
    return;
  }

  let filtered = allNames.filter(n => n.toLowerCase().includes(input));

  if (filtered.length === 0) {
    box.innerHTML = "<div class='suggest-item' style='color:red;'>❌ Nama tidak ditemukan</div>";
    box.style.display = "block";
    return;
  }

  box.style.display = "block";
  filtered.slice(0, 5).forEach(name => {
    let div = document.createElement("div");
    div.className = "suggest-item"; 
    div.innerText = name;
    
    div.onclick = function() {
      // Hanya mengisi input di dalam modal login saja
      document.getElementById("loginName").value = name;
      box.innerHTML = "";
      box.style.display = "none";
      
      // Bagian sinkronisasi ke dashboard (dashSearch) SUDAH DIHAPUS
    };
    box.appendChild(div);
  });
}
    
/* ================= TAMBAHAN: MODIFIKASI FUNGSI LOGOUT ================= */
function logout(){
  // Sembunyikan dashboard dan kembali ke halaman depan (Hero)
  document.getElementById("dashboard").style.display="none";
  document.querySelector(".hero").style.display="block";

  // Pastikan form login benar-benar kosong saat logout
  resetRole();

  // Refresh halaman agar sistem kembali segar (Fresh)
  setTimeout(()=>{
    location.reload();
  }, 300);
}

// Tambahkan ini agar bisa tutup pakai tombol ESC di Keyboard
window.onkeydown = function(event) {
  if (event.key === "Escape") {
    closeLogin();
  }
};

</script>
