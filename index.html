<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Kurikulum Digital - SMKN 3 Linggabuana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo-group">
        <img src="https://smkn3linggabuana.sch.id/wp-content/uploads/2021/12/cropped-cropped-imageedit_3_6783038155-1.png" alt="Logo Sekolah">
        <div class="school-text">
            <div class="school-name">SMKN 3 LINGGABUANA PURWAKARTA</div>
            <div class="school-sub">Arsip Kurikulum Digital</div>
        </div>
    </div>
</nav>

<section class="hero">
    <h1>Arsip Kurikulum Digital</h1>
    <p>Sistem Manajemen Arsip Sekolah</p>
    <button class="hero-btn" onclick="showLogin()">Masuk Sistem</button>
</section>

<div id="loginModal" class="modal">
    <div class="modal-box">
        <span class="close-x" onclick="closeLogin()">✕</span>
        <h2>🔐 Masuk Sistem</h2>
        <div class="role-selection" id="roleSelection">
            <button class="role-btn" onclick="selectRole('guru')">👨‍🏫 Guru</button>
            <button class="role-btn" onclick="selectRole('siswa')">🎓 Siswa</button>
        </div>
        <div id="loginFields" style="display:none; margin-top:20px;">
            <p id="selectedRoleText" style="font-weight:bold; color:#0288d1;"></p>
            <input id="user" placeholder="ID User" class="premium-input">
            <div class="password-box">
                <input type="password" id="pass" placeholder="Password" onkeypress="checkEnter(event)">
                <span class="eye-icon" onclick="togglePassword()">👁️</span>
            </div>
            <button onclick="login()" class="login-submit-btn">Login</button>
            <button onclick="resetRole()" class="back-btn">⬅ Kembali</button>
            <p id="loginMsg" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
        <input type="hidden" id="role" value="">
    </div>
</div>

<div id="dashboard" style="display:none">
    <div class="container">
        <div class="card">
            <h2>📂 Arsip Kurikulum</h2>
            <input id="search" class="premium-input" placeholder="🔍 Cari nama" onkeyup="searchName()">
            <div id="suggestions"></div>
            <select id="menu" class="premium-input" onchange="changeMenu()">
                <option value="">📁 Pilih Kategori</option>
                <option value="skbm">SKBM</option>
                <option value="sertifikat">Sertifikat</option>
                <option value="sklain">SK Lain</option>
            </select>
            <div id="subMenu"></div>
            <button id="downloadBtn" class="download-btn" onclick="openDownload()">⬇ Download File</button>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<footer class="footer">
    <p>📚 Aplikasi ini dibuat sepenuhnya oleh <b>Ridho Kiswanto</b></p>
</footer>

<script src="script.js"></script>
</body>
</html>
