<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Kurikulum SMKN 3</title>
    <style>
        /* CSS Utama */
        body { 
            background: #f4f7f6; 
            margin: 0; 
            font-family: Arial, sans-serif; 
            overflow: hidden; /* Mencegah scroll double */
        }
        
        /* Kontainer Utama Layar Loading */
        .loading-screen {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            width: 100%;
            position: fixed; /* Fixed agar menutupi seluruh layar */
            top: 0;
            left: 0;
            background: #f4f7f6;
            z-index: 99; /* Muncul di atas iframe */
            
            /* Trik untuk Fade Out Halus */
            opacity: 1; /* Awalnya terlihat penuh */
            visibility: visible; /* Awalnya terlihat penuh */
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out; /* Durasi animasi */
        }

        /* Kelas untuk memicu efek pudar (dipanggil lewat JS) */
        .loading-screen.fade-out {
            opacity: 0; /* Menjadi transparan */
            visibility: hidden; /* Benar-benar hilang setelah transparan */
        }

        /* Style Asli Loader Kamu */
        .loader { 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid #0288d1; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        img { width: 100px; margin-bottom: 20px; }

        /* Style untuk Iframe agar tampil penuh */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1; /* Iframe berada di bawah layar loading */
        }
    </style>
</head>
<body>

    <div id="loader-container" class="loading-screen">
        <img src="https://smkn3linggabuana.sch.id/wp-content/uploads/2021/12/cropped-cropped-imageedit_3_6783038155-1.png">
        <div class="loader"></div>
        <p style="color: #555; margin-top: 15px;">Menghubungkan ke Server Arsip...</p>
    </div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbzNDPDU_BpWJ5qDAXezYsmTYSH_p-ihkuAHxKOz2UHWoHi1QVmcJiVwG3hu2jTRkISRjw/exec" 
        onload="startFadeOut()">
    </iframe>

    <script>
        // Fungsi untuk menghilangkan loader secara perlahan
        function startFadeOut() {
            const loader = document.getElementById('loader-container');
            // Menambahkan kelas 'fade-out' yang memicu animasi CSS
            loader.classList.add('fade-out');
        }
    </script>
</body>
</html>
