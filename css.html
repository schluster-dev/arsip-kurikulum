<style>
/* ================= GLOBAL ================= */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #e3f2fd, #f1f8ff);
  overflow-x: hidden; /* Mencegah geser kanan-kiri yang tidak perlu */
}

/* ================= NAVBAR ================= */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 5%; /* Padding lebih fleksibel */
  background: linear-gradient(90deg, #4fc3f7, #0288d1);
  color: white;
  box-shadow: 0 5px 25px rgba(0,0,0,.15);
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-group img {
  height: 50px; /* Ukuran logo lebih proporsional */
}

.school-text {
  display: flex;
  flex-direction: column;
}

.school-name {
  font-size: 16px; /* Ukuran default lebih aman untuk HP */
  font-weight: 600;
}

.school-sub {
  font-size: 12px;
  opacity: .9;
}

/* ================= SUB-NAVBAR FINAL (TENGAH & ROUNDED) ================= */
.sub-navbar {
    display: none; 
    justify-content: center; 
    align-items: center;     
    
    /* UBAH DI SINI: */
    margin-top: 0px;  /* Kalau masih terlalu ke atas, ganti jadi 0px atau 5px */
    
    margin-bottom: 20px;
    position: relative;
    z-index: 100;
    padding: 0 5%;
    min-height: 50px;
}

/* TAMPILAN MENU KAPSUL (PC) */
.nav-links {
    display: flex;
    gap: 8px;
    background: white;
    padding: 6px 12px;
    border-radius: 50px; /* Bentuk Kapsul */
    border: 1px solid #e1f5fe;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.nav-links a {
    text-decoration: none;
    color: #0288d1;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 30px; 
    transition: 0.3s;
}

.nav-links a:hover {
    background: #e1f5fe;
    color: #01579b;
}

/* TOMBOL HAMBURGER (PC SEMBUNYI) */
.menu-toggle {
    display: none; 
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    padding: 10px;
    background: #0288d1; /* Kotak Biru */
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(2, 136, 209, 0.2);
}

.menu-toggle span {
    width: 20px;
    height: 3px;
    background: white; /* Garis Putih */
    border-radius: 5px;
}

/* ================= RESPONSIVE (TABLET & HP) ================= */
@media (max-width: 992px) {
    .sub-navbar {
        justify-content: center !important; /* Hamburger jadi di TENGAH layar HP */
        margin-top: -10px;
    }

    .menu-toggle {
        display: flex; /* Hamburger Muncul */
    }

    .nav-links {
        display: none; /* Sembunyikan kapsul */
        flex-direction: column;
        position: absolute;
        top: 55px; /* Jarak dropdown dari tombol */
        left: 5%;
        right: 5%;
        width: auto;
        background: white;
        border-radius: 20px; /* Dropdown Rounded */
        padding: 10px 0;
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        z-index: 1000;
        overflow: hidden;
    }

    .nav-links.active {
        display: flex;
        animation: slideDown 0.3s ease-out;
    }

    .nav-links a {
        padding: 15px 25px;
        border-radius: 0;
        border-bottom: 1px solid #f1f8ff;
        text-align: left;
    }

    .nav-links a:last-child {
        border-bottom: none;
    }
}

/* Animasi Halus */
@keyframes slideDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
}
  
/* ================= HERO ================= */
.hero {
  text-align: center;
  padding: 80px 20px; /* Padding dikurangi untuk HP */
}

.hero h1 {
  font-size: 32px; /* Ukuran teks judul di HP */
  margin-bottom: 10px;
  color: #0277bd;
}

.hero p {
  opacity: .8;
  margin-top: 10px;
  font-size: 16px;
}

.hero-btn {
  margin-top: 30px;
  padding: 15px 40px;
  border: none;
  border-radius: 50px; /* Lebih membulat agar modern */
  background: linear-gradient(90deg, #4fc3f7, #0288d1);
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(2,136,209,.3);
  transition: .3s;
}

.hero-btn:hover {
  transform: translateY(-3px);
}

/* ================= LOGIN MODAL ================= */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(8px);
  z-index: 1000;
  padding: 20px; /* Padding agar modal tidak nempel layar HP */
}

.modal-box {
  width: 100%;
  max-width: 350px; /* Maksimal lebar modal */
  padding: 30px 20px;
  border-radius: 25px;
  background: rgba(255,255,255,1); /* Lebih solid agar teks jelas */
  text-align: center;
  box-shadow: 0 25px 70px rgba(0,0,0,.25);
  position: relative;
}

.modal-box input {
  width: 100%;
  box-sizing: border-box;
  padding: 13px 14px;
  margin-top: 15px;
  border-radius: 14px;
  border: 1px solid #b3e5fc;
  font-size: 14px;
}

.modal-box button {
  margin-top: 22px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #4fc3f7, #0288d1);
  color: white;
  cursor: pointer;
  font-weight: 600;
}

/* ================= PASSWORD BOX ================= */

/* 1. Pastikan pembungkus password input dan icon-nya ada di mode flex */
.password-box {
  position: relative; /* Ini wajib agar icon mata bisa diposisikan di dalam */
  display: flex;       /* Tambahkan ini */
  align-items: center; /* JADIIN KE TENGAH VERTIKAL */
  margin-bottom: 20px; /* Jarak ke tombol login di bawahnya */
}

/* 2. Style untuk input password itu sendiri */
.password-box input {
  width: 100%;             /* Penuh ke kanan */
  padding: 15px;           /* Ukuran padding yang nyaman */
  padding-right: 50px;     /* Kasih ruang di kanan untuk icon matanya */
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
  box-sizing: border-box;  /* Biar padding tidak nambah lebar */
  outline: none;
}

/* 3. Style untuk icon mata (PENGATURAN POSISI DI SINI) */
.eye-icon {
  position: absolute !important;
  right: 15px !important;
  
  /* Kita coba tarik lebih bawah lagi secara manual */
  top: 60% !important; /* Saya ubah dari 50% ke 60% agar lebih turun */
  transform: translateY(-50%) !important;
  
  cursor: pointer !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  height: 24px !important; /* Tentukan tinggi area icon */
  width: 24px !important;  /* Tentukan lebar area icon */
  z-index: 10 !important;
}

/* Pastikan SVG di dalamnya juga ikut aturan */
.eye-icon svg {
  width: 20px !important;
  height: 20px !important;
  display: block !important;
}

/* Gaya Tombol Role */
.role-selection {
  display: flex;
  flex-direction: column; /* Vertikal untuk HP */
  gap: 12px;
  margin-top: 20px;
}

.role-btn {
  width: 100%;
  padding: 18px 10px;
  border: 2px solid #b3e5fc;
  border-radius: 15px;
  background: white;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
  font-size: 16px;
}

.role-btn:hover {
  background: #e1f5fe;
  border-color: #0288d1;
}

/* ================= DASHBOARD ================= */
.container {
  width: 95%;
  max-width: 600px;
  margin: 20px auto;
}

.card {
  background: white;
  padding: 25px 20px;
  border-radius: 22px;
  box-shadow: 0 15px 40px rgba(0,0,0,.08);
}

/* ================= INPUT & DOWNLOAD ================= */
.premium-input {
  width: 100%;
  padding: 14px;
  margin-top: 18px;
  border-radius: 14px;
  border: 1px solid #b3e5fc;
  font-size: 14px;
  box-sizing: border-box;
}

.download-btn {
  display: none;
  margin-top: 25px;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #26c6da, #0288d1);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

/* Sembunyikan menu kategori dan tombol download di awal */
#menu, #downloadBtn {
  display: none;
}
#subMenu {
  display: block !important; /* Pastikan dia selalu siap tampil */
  width: 100%;
}

/* Animasi Berputar */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Class untuk icon yang sedang loading */
.spinner-icon {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 1s ease-in-out infinite;
  margin-right: 10px;
  vertical-align: middle;
}

/* Efek tombol saat dilarang klik */
.disabled {
  pointer-events: none;
  opacity: 0.7;
  filter: grayscale(0.5);
}

/* ================= LOGOUT BUTTON ================= */
.logout-btn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  padding: 12px 20px;
  border-radius: 50px;
  background: linear-gradient(135deg, #ff5252, #d32f2f);
  color: white;
  border: none;
  font-weight: 600;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  z-index: 100;
  
  /* TAMBAHKAN BARIS INI */
  cursor: pointer; 
  transition: transform 0.2s, background 0.2s;
}

/* Tambahkan efek sedikit membesar saat disentuh mouse agar lebih interaktif */
.logout-btn:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #d32f2f, #b71c1c);
}

/* ================= MEDIA QUERIES (UNTUK TAMPILAN DESKTOP) ================= */
@media (min-width: 768px) {
  .navbar { padding: 18px 8%; }
  .school-name { font-size: 20px; }
  .logo-group img { height: 65px; }
  .hero { padding: 140px 20px; }
  .hero h1 { font-size: 52px; }
  .role-selection { flex-direction: row; } /* Berjejer di laptop */
  .container { margin: 60px auto; }
  .card { padding: 35px; }
}

@media (max-width: 600px) {
  .modal-box {
    width: 90%; /* Memberi ruang bernapas di sisi kiri-kanan */
    padding: 20px 15px;
  }
}

/* Tambahan: Penutup Modal (X) */
.close-x {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 24px;
  color: #bbb;
  cursor: pointer;
}

.back-btn {
  background: none !important;
  color: #888 !important;
  font-size: 13px;
  text-decoration: underline;
  margin-top: 10px;
  border: none !important;
}

#suggestions {
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  position: absolute;
  width: calc(100% - 40px);
  z-index: 100;
}

#suggestions {
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  position: absolute;
  width: calc(100% - 2px); /* Sesuaikan lebar agar pas dengan input */
  z-index: 1000;
  max-height: 200px;
  overflow-y: auto;
}

.suggest-item {
  padding: 12px 15px;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  color: #333;
}

.suggest-item:hover {
  background-color: #e1f5fe;
  color: #0288d1;
  padding-left: 20px; /* Efek geser sedikit saat di-hover */
}

/* ================= FOOTER (FIT TO TEXT) ================= */
.footer {
  text-align: center;
  /* PERUBAHAN DI SINI: Naikkan margin-top agar footer menjauh dari dashboard */
  margin-top: 100px; 
  
  /* Padding tetap ramping agar box putih tidak melar */
  padding: 15px 20px; 
  
  color: #555;
  font-size: 13px;
  background: white;
  border-top: 1px solid #e1f5fe;
  line-height: 1.6;
  position: relative;
  z-index: 5;
}

/* Responsif HP */
@media (max-width: 768px) {
  .footer {
    /* Di HP jaraknya kita buat 60px saja agar tidak terlalu jauh di layar sempit */
    margin-top: 60px; 
    padding: 10px 15px 25px 15px; 
    font-size: 11px;
  }
}
</style>
